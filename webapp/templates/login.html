<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connexion – Reloading Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e5e7eb; }
    .field-input { width:100%; background:#1a1a24; border:1px solid #374151; color:#e5e7eb; border-radius:8px; padding:12px; font-size:16px; outline:none; transition:border-color .15s; }
    .field-input:focus { border-color:#60a5fa; }
    .btn-primary { width:100%; background:#2563eb; color:white; font-weight:600; font-size:16px; padding:14px; border-radius:12px; border:none; cursor:pointer; transition:background .15s; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-google { width:100%; background:#1a1a24; border:1px solid #374151; color:#e5e7eb; font-weight:500; font-size:15px; padding:12px; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:border-color .15s; text-decoration:none; }
    .btn-google:hover { border-color:#60a5fa; }
    .divider { display:flex; align-items:center; gap:12px; color:#6b7280; font-size:13px; margin:20px 0; }
    .divider::before,.divider::after { content:''; flex:1; border-top:1px solid #1f2937; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <!-- Logo/Title -->
        <div class="text-center mb-8">
            <div class="text-3xl font-bold mb-1">Reloading Tracker</div>
            <div class="text-gray-500 text-sm">Suivi de rechargement au stand</div>
        </div>

        {% if error %}
        <div class="bg-red-900/30 border border-red-800 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <!-- Login form -->
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="email" name="email" class="field-input" placeholder="Email" required autocomplete="email">
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="field-input" placeholder="Mot de passe" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        {% if has_google %}
        <div class="divider">ou</div>
        <a href="/auth/google" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuer avec Google
        </a>
        {% endif %}

        <div class="text-center mt-6 text-sm text-gray-500">
            Pas encore de compte ?
            <a href="/register" class="text-blue-400 hover:underline">Créer un compte</a>
        </div>
    </div>
</body>
</html>
