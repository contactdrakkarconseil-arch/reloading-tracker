<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Connexion – Reloading Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e5e7eb; }
    .field-input { width:100%; background:#1a1a24; border:1px solid #374151; color:#e5e7eb; border-radius:8px; padding:12px; font-size:16px; outline:none; transition:border-color .15s; }
    .field-input:focus { border-color:#60a5fa; }
    .btn-primary { width:100%; background:#2563eb; color:white; font-weight:600; font-size:16px; padding:14px; border-radius:12px; border:none; cursor:pointer; transition:background .15s; }
    .btn-primary:hover { background:#1d4ed8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <!-- Logo/Title -->
        <div class="text-center mb-8">
            <div class="text-3xl font-bold mb-1">Reloading Tracker</div>
            <div class="text-gray-500 text-sm">Suivi de rechargement au stand</div>
        </div>

        {% if error %}
        <div class="bg-red-900/30 border border-red-800 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <!-- Login form -->
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="email" name="email" class="field-input" placeholder="Email" required autocomplete="email">
            </div>
            <div class="mb-4">
                <input type="password" name="password" class="field-input" placeholder="Mot de passe" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="text-center mt-6 text-sm text-gray-500">
            Pas encore de compte ?
            <a href="/register" class="text-blue-400 hover:underline">Créer un compte</a>
        </div>
    </div>
</body>
</html>
